<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RoView</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="topbar">
    ⭐ RoView
    <span>Community Roblox game reviews</span>
  </header>

  <main>

    <div class="carousel-wrapper">

      <div class="carousel" id="carousel">

        <div class="card">
          <div class="icon">⭐</div>
          <h2>Verified Ratings</h2>
          <p>Only real Roblox users can rate games.</p>
        </div>

        <div class="card">
          <div class="icon">💬</div>
          <h2>Real Reviews</h2>
          <p>See what players actually think.</p>
        </div>

        <div class="card">
          <div class="icon">💎</div>
          <h2>Hidden Gems</h2>
          <p>Discover underrated Roblox games.</p>
        </div>

        <div class="card">
          <div class="icon">🔍</div>
          <h2>Game Search</h2>
          <p>Search by name or Game ID instantly.</p>
        </div>

      </div>

    </div>

    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>

    <button id="linkBtn">Link Roblox Account</button>

  </main>

  <script src="script.js"></script>
</body>
</html>
